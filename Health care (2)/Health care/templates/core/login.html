{% extends 'base.html' %}
{% block title %}Sign In{% endblock %}
{% block footer %}{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <div class="auth-header">
            <div style="width:60px;height:60px;background:var(--primary-gradient);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;">
                <i class="fas fa-heartbeat" style="color:white;"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to your HealthCareer Pro account</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label><i class="fas fa-user" style="margin-right:0.5rem;color:var(--primary-light);"></i>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock" style="margin-right:0.5rem;color:var(--primary-light);"></i>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:0.5rem;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <p style="text-align:center;margin-top:1.5rem;color:var(--text-muted);">
            Don't have an account? <a href="{% url 'register' %}" style="font-weight:600;">Create Account</a>
        </p>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block footer %}{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="card auth-card" style="max-width:550px;">
        <div class="auth-header">
            <div style="width:60px;height:60px;background:linear-gradient(135deg,#43e97b,#38f9d7);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;">
                <i class="fas fa-user-plus" style="color:#0f0f23;"></i>
            </div>
            <h2>Create Account</h2>
            <p>Join HealthCareer Pro and transform your healthcare career</p>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="grid-2">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" class="form-control" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Last name" required>
                </div>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" class="form-control">
                    <option value="doctor">Doctor</option>
                    <option value="nurse">Nurse</option>
                    <option value="technician">Lab Technician</option>
                    <option value="pharmacist">Pharmacist</option>
                    <option value="student">Medical Student</option>
                    <option value="admin_staff">Administrative Staff</option>
                    <option value="hospital_admin">Hospital Administrator</option>
                </select>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Create password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-success btn-lg" style="width:100%;margin-top:0.5rem;">
                <i class="fas fa-rocket"></i> Create Account
            </button>
        </form>
        <p style="text-align:center;margin-top:1.5rem;color:var(--text-muted);">
            Already have an account? <a href="{% url 'login' %}" style="font-weight:600;">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Submit Credential{% endblock %}
{% block content %}
<div class="page-header">
    <div class="breadcrumb"><a href="{% url 'index' %}">Home</a> <i class="fas fa-chevron-right"></i> <a href="{% url 'credentials:credential_list' %}">Credentials</a> <i class="fas fa-chevron-right"></i> Submit</div>
    <h1>Submit <span class="gradient-text">New Credential</span></h1>
    <p>Submit your professional license or certification for verification</p>
</div>
<div class="container container-sm">
    <div class="card" style="padding:2rem;">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group"><label>Credential Type</label>
                <select name="credential_type" class="form-control" required>
                    <option value="">Select type...</option>
                    <option value="medical_license">Medical License</option>
                    <option value="nursing_license">Nursing License</option>
                    <option value="board_certification">Board Certification</option>
                    <option value="specialty_certification">Specialty Certification</option>
                    <option value="cpr_certification">CPR/BLS Certification</option>
                    <option value="acls_certification">ACLS Certification</option>
                    <option value="pharmacy_license">Pharmacy License</option>
                    <option value="technician_certification">Technician Certification</option>
                    <option value="residency_completion">Residency Completion</option>
                    <option value="fellowship">Fellowship Certificate</option>
                </select>
            </div>
            <div class="form-group"><label>Title/Name</label><input type="text" name="title" class="form-control" placeholder="e.g., Medical License - Karnataka Medical Council" required></div>
            <div class="form-group"><label>License/Certificate Number</label><input type="text" name="license_number" class="form-control" placeholder="e.g., KMC/2024/12345" required></div>
            <div class="form-group"><label>Issuing Authority</label><input type="text" name="issuing_authority" class="form-control" placeholder="e.g., Karnataka Medical Council" required></div>
            <div class="form-group"><label>Issuing State</label><input type="text" name="issuing_state" class="form-control" placeholder="e.g., Karnataka"></div>
            <div class="grid-2">
                <div class="form-group"><label>Issue Date</label><input type="date" name="issue_date" class="form-control" required></div>
                <div class="form-group"><label>Expiry Date</label><input type="date" name="expiry_date" class="form-control"></div>
            </div>
            <div class="form-group"><label>Upload Document (PDF/Image)</label><input type="file" name="document" class="form-control" accept=".pdf,.jpg,.jpeg,.png"></div>
            <div class="form-group"><label>Additional Notes</label><textarea name="notes" class="form-control" placeholder="Any additional information..."></textarea></div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;"><i class="fas fa-paper-plane"></i> Submit for Verification</button>
        </form>
    </div>
</div>
{% endblock %}

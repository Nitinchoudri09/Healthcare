{% extends 'base.html' %}
{% block title %}Apply{% endblock %}
{% block content %}
<div class="page-header">
    <div class="breadcrumb"><a href="{% url 'index' %}">Home</a> <i class="fas fa-chevron-right"></i> <a href="{% url 'jobs:job_list' %}">Jobs</a> <i class="fas fa-chevron-right"></i> Apply</div>
    <h1>Apply for <span class="gradient-text">{{ job.title }}</span></h1>
    <p>{{ job.hospital_name }} • {{ job.location }}</p>
</div>
<div class="container container-sm">
    <div class="card" style="padding:2rem;">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group"><label>Cover Letter</label><textarea name="cover_letter" class="form-control" rows="8" placeholder="Introduce yourself and explain why you're the ideal candidate for this position..."></textarea></div>
            <div class="form-group"><label>Upload Resume (PDF)</label><input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx"></div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;"><i class="fas fa-paper-plane"></i> Submit Application</button>
        </form>
    </div>
</div>
{% endblock %}
